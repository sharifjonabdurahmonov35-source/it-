<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Createx</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="container nav">
            <div class="logo">Create X</div>

            <ul class="menu">
                <li><a href="#">About Us</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contacts</a></li>
            </ul>

            <div class="nav-btns">
                <button class="consult">Get Consultation</button>
                <a href="#" class="login">Log in / Register</a>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-content">

            <div class="hero-left">
                <div class="play">
                    <span class="circle">▶️</span>
                    <span>Play showreel</span>
                </div>

                <h1>
                    Enjoy studying <br>
                    with Createx <br>
                    Online Courses
                </h1>

                <div class="hero-buttons">
                    <button class="btn-outline">About us</button>
                    <button class="btn-primary">Explore courses</button>
                </div>
            </div>

            <div class="hero-right">
                <img src="./illustration.png" alt="">
            </div>

        </div>
    </section>

    <!-- Statistics -->
    <section class="stats">
        <div class="container stats-box">
            <div>
                <h2>1200</h2>
                <p>Students graduated</p>
            </div>

            <div>
                <h2>84</h2>
                <p>Completed courses</p>
            </div>

            <div>
                <h2>16</h2>
                <p>Qualified tutors</p>
            </div>

            <div>
                <h2>5</h2>
                <p>Years of experience</p>
            </div>
        </div>
    </section>

</body>
</html>
